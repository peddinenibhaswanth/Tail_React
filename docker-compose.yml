services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  solr:
    image: solr:9
    restart: unless-stopped
    ports:
      - "8983:8983"
    command: solr-precreate tailwaggers

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
      - solr
    env_file:
      - ./backend/.env
    environment:
      PORT: "5000"
      NODE_ENV: "production"
      CLIENT_URL: "http://localhost:3000"
      REDIS_URL: "redis://redis:6379"
      REDIS_ENABLED: "true"
      SOLR_URL: "http://solr:8983/solr/tailwaggers"
      SOLR_ENABLED: "true"
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: "http://localhost:5000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  mongo_data:
