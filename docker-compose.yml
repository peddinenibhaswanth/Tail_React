services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
      - redis
    environment:
      PORT: "5000"
      NODE_ENV: "production"
      MONGODB_URI: "mongodb://mongo:27017/tail-treasures"
      JWT_SECRET: "change-me-in-production"
      CLIENT_URL: "http://localhost:3000"
      REDIS_URL: "redis://redis:6379"
      REDIS_ENABLED: "true"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: "http://localhost:5000"
      HOST: "0.0.0.0"
    ports:
      - "3000:3000"

volumes:
  mongo_data:
